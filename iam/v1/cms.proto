// =============================================================================
// MESSAGES - CMS Section: Public Landing Content
// =============================================================================

// GetPublicLandingContentRequest is the request for fetching all published
// landing page content in a single call. This is a public endpoint — no
// authentication required.
message GetPublicLandingContentRequest {}

// GetPublicLandingContentResponse is the response containing all published
// landing page sections and site settings.
message GetPublicLandingContentResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // All published landing page sections, ordered by sort_order.
  repeated CMSSection sections = 2;
  // All site settings.
  repeated CMSSetting settings = 3;
}

