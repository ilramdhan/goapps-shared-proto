  // Lucide icon name (max 100 chars).
  string icon_name = 6 [(buf.validate.field).string.max_len = 100];
  // Image URL (max 500 chars).
  string image_url = 7 [(buf.validate.field).string.max_len = 500];
  // CTA button text (max 100 chars).
  string button_text = 8 [(buf.validate.field).string.max_len = 100];
