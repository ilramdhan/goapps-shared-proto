syntax = "proto3";

package iam.v1;

// Note: go_package is managed by buf.gen.yaml managed mode

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "google/api/annotations.proto";

// =============================================================================
// ENUMS
// =============================================================================

// CMSSectionType represents the type of a CMS landing page section.
enum CMSSectionType {
  // Default unspecified value.
  CMS_SECTION_TYPE_UNSPECIFIED = 0;
  // Hero banner section at the top of the landing page.
  CMS_SECTION_TYPE_HERO = 1;
  // Feature card section highlighting platform capabilities.
  CMS_SECTION_TYPE_FEATURE = 2;
  // FAQ accordion section with questions and answers.
  CMS_SECTION_TYPE_FAQ = 3;
  // Testimonial/quote section from users or stakeholders.
  CMS_SECTION_TYPE_TESTIMONIAL = 4;
  // Call-to-action section with button.
  CMS_SECTION_TYPE_CTA = 5;
  // Custom freeform section.
  CMS_SECTION_TYPE_CUSTOM = 6;
}

// CMSSettingType represents the data type of a CMS setting value.
enum CMSSettingType {
  // Default unspecified value.
  CMS_SETTING_TYPE_UNSPECIFIED = 0;
  // Plain text value.
  CMS_SETTING_TYPE_TEXT = 1;
  // Rich text value (Markdown or HTML).
  CMS_SETTING_TYPE_RICH_TEXT = 2;
  // Image URL or path.
  CMS_SETTING_TYPE_IMAGE = 3;
  // URL value.
  CMS_SETTING_TYPE_URL = 4;
  // JSON structured value.
  CMS_SETTING_TYPE_JSON = 5;
}

// =============================================================================
// MESSAGES - CMS Page Entity
// =============================================================================

// CMSPage represents a full-page CMS content entity (e.g., Privacy Policy, Terms of Service).
message CMSPage {
  // Unique identifier (UUID).
  string page_id = 1;
  // URL slug (e.g., "privacy", "terms", "about"). Unique, immutable after creation.
  string page_slug = 2;
  // Page title.
  string page_title = 3;
  // Rich text content (Markdown or HTML).
  string page_content = 4;
  // SEO meta description.
  string meta_description = 5;
  // Whether the page is publicly visible.
  bool is_published = 6;
  // When the page was published (ISO 8601).
  string published_at = 7;
  // Display order.
  int32 sort_order = 8;
  // Audit information.
  common.v1.AuditInfo audit = 16;
}

// =============================================================================
// MESSAGES - CMS Section Entity
// =============================================================================

// CMSSection represents an individual section of the landing page
// (e.g., hero banner, feature card, FAQ item).
message CMSSection {
  // Unique identifier (UUID).
  string section_id = 1;
  // Section type (HERO, FEATURE, FAQ, etc.).
  CMSSectionType section_type = 2;
  // Unique key (e.g., "landing_hero", "landing_feature_1"). Immutable after creation.
  string section_key = 3;
  // Section title.
  string title = 4;
  // Section subtitle or description.
  string subtitle = 5;
  // Rich text content body.
  string content = 6;
  // Lucide icon name (for feature cards, e.g., "Server", "Shield").
  string icon_name = 7;
  // Image URL (MinIO/S3 path).
  string image_url = 8;
  // CTA button text.
  string button_text = 9;
  // CTA button link.
  string button_url = 10;
  // Display order within its type.
  int32 sort_order = 11;
  // Whether the section is visible on the landing page.
  bool is_published = 12;
  // Flexible key-value pairs as JSON string.
  string metadata = 13;
  // Audit information.
  common.v1.AuditInfo audit = 16;
}

// =============================================================================
// MESSAGES - CMS Setting Entity
// =============================================================================

// CMSSetting represents a key-value site configuration
// (e.g., site name, footer text, social links).
message CMSSetting {
  // Unique identifier (UUID).
  string setting_id = 1;
  // Unique key (e.g., "site_name", "footer_copyright"). Immutable.
  string setting_key = 2;
  // Setting value.
  string setting_value = 3;
  // Data type of the value.
  CMSSettingType setting_type = 4;
  // Group for admin UI organization (e.g., "general", "branding", "social").
  string setting_group = 5;
  // Description for admin UI tooltip.
  string description = 6;
  // Whether admins can modify this setting (some are system-locked).
  bool is_editable = 7;
  // Audit information.
  common.v1.AuditInfo audit = 16;
}

// =============================================================================
// MESSAGES - CMS Page: Create
// =============================================================================

// CreateCMSPageRequest is the request for creating a new CMS page.
message CreateCMSPageRequest {
  // URL slug (lowercase, alphanumeric with hyphens, 1-100 chars).
  // Must start with a letter. Immutable after creation.
  string page_slug = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-z][a-z0-9-]*$"
  }];
  // Page title (1-200 chars).
  string page_title = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  // Rich text content (Markdown or HTML).
  string page_content = 3;
  // SEO meta description (max 500 chars).
  string meta_description = 4 [(buf.validate.field).string.max_len = 500];
  // Whether to publish immediately.
  bool is_published = 5;
  // Display order.
  int32 sort_order = 6;
}

// CreateCMSPageResponse is the response for creating a CMS page.
message CreateCMSPageResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Created CMS page data.
  CMSPage data = 2;
}

// =============================================================================
// MESSAGES - CMS Page: Get
// =============================================================================

// GetCMSPageRequest is the request for getting a CMS page by ID.
message GetCMSPageRequest {
  // CMS page ID (UUID format).
  string page_id = 1 [(buf.validate.field).string.uuid = true];
}

// GetCMSPageResponse is the response for getting a CMS page.
message GetCMSPageResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // CMS page data.
  CMSPage data = 2;
}

// GetCMSPageBySlugRequest is the request for getting a CMS page by its URL slug.
// This is a public endpoint — no authentication required.
message GetCMSPageBySlugRequest {
  // URL slug (e.g., "privacy", "terms").
  string slug = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
    pattern: "^[a-z][a-z0-9-]*$"
  }];
}

// GetCMSPageBySlugResponse is the response for getting a CMS page by slug.
message GetCMSPageBySlugResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // CMS page data.
  CMSPage data = 2;
}

// =============================================================================
// MESSAGES - CMS Page: Update
// =============================================================================

// UpdateCMSPageRequest is the request for updating a CMS page.
// Note: page_slug is immutable and cannot be changed after creation.
message UpdateCMSPageRequest {
  // CMS page ID to update (UUID format).
  string page_id = 1 [(buf.validate.field).string.uuid = true];
  // New page title (optional, 1-200 chars if provided).
  optional string page_title = 2 [(buf.validate.field).string = {max_len: 200}];
  // New content (optional).
  optional string page_content = 3;
  // New meta description (optional, max 500 chars).
  optional string meta_description = 4 [(buf.validate.field).string.max_len = 500];
  // New published status (optional).
  optional bool is_published = 5;
  // New sort order (optional).
  optional int32 sort_order = 6;
}

// UpdateCMSPageResponse is the response for updating a CMS page.
message UpdateCMSPageResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Updated CMS page data.
  CMSPage data = 2;
}

// =============================================================================
// MESSAGES - CMS Page: Delete
// =============================================================================

// DeleteCMSPageRequest is the request for deleting (soft delete) a CMS page.
message DeleteCMSPageRequest {
  // CMS page ID to delete (UUID format).
  string page_id = 1 [(buf.validate.field).string.uuid = true];
}

// DeleteCMSPageResponse is the response for deleting a CMS page.
message DeleteCMSPageResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
}

// =============================================================================
// MESSAGES - CMS Page: List
// =============================================================================

// ListCMSPagesRequest is the request for listing CMS pages with search and pagination.
message ListCMSPagesRequest {
  // Page number (1-indexed, min 1).
  int32 page = 1 [(buf.validate.field).int32.gte = 1];
  // Items per page (1-100).
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 1
    lte: 100
  }];
  // Search query (searches in slug, title, content).
  string search = 3 [(buf.validate.field).string.max_len = 100];
  // Filter by published status: true = published only, false = draft only.
  // If not set, returns all pages.
  optional bool is_published = 4;
  // Sort field: "slug", "title", "sort_order", "created_at" (default: "sort_order").
  string sort_by = 5 [(buf.validate.field).string = {
    in: [
      "",
      "slug",
      "title",
      "sort_order",
      "created_at"
    ]
  }];
  // Sort order: "asc", "desc" (default: "asc").
  string sort_order = 6 [(buf.validate.field).string = {
    in: [
      "",
      "asc",
      "desc"
    ]
  }];
}

// ListCMSPagesResponse is the response for listing CMS pages.
message ListCMSPagesResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // List of CMS pages.
  repeated CMSPage data = 2;
  // Pagination metadata.
  common.v1.PaginationResponse pagination = 3;
}

