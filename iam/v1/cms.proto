// =============================================================================
// MESSAGES - CMS Image Upload
// =============================================================================

// UploadCMSImageRequest is the request for uploading an image to CMS storage (MinIO).
message UploadCMSImageRequest {
  // Target folder for organizing uploads (e.g., "sections", "pages").
  string folder = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[a-z][a-z0-9-]*$"
  }];
  // Raw file binary data (max 5MB).
  bytes file_data = 2 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 5242880
  }];
  // Original file name.
  string file_name = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  // MIME content type (image/jpeg, image/png, image/webp, image/svg+xml).
  string content_type = 4 [(buf.validate.field).string = {
    in: [
      "image/jpeg",
      "image/png",
      "image/webp",
      "image/svg+xml"
    ]
  }];
}

// UploadCMSImageResponse is the response containing the uploaded image URL.
message UploadCMSImageResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Public URL of the uploaded image.
  string image_url = 2;
}

// =============================================================================
// SERVICE DEFINITIONS
// =============================================================================

// CMSPageService manages full-page CMS content (Privacy Policy, Terms of Service, etc.).
service CMSPageService {
  // CreateCMSPage creates a new CMS page.
  rpc CreateCMSPage(CreateCMSPageRequest) returns (CreateCMSPageResponse) {
    option (google.api.http) = {
      post: "/api/v1/iam/cms/pages"
      body: "*"
    };
  }

  // GetCMSPage retrieves a CMS page by ID.
  rpc GetCMSPage(GetCMSPageRequest) returns (GetCMSPageResponse) {
    option (google.api.http) = {get: "/api/v1/iam/cms/pages/{page_id}"};
  }

  // GetCMSPageBySlug retrieves a CMS page by its URL slug.
  // This is a public endpoint — no authentication required.
  rpc GetCMSPageBySlug(GetCMSPageBySlugRequest) returns (GetCMSPageBySlugResponse) {
    option (google.api.http) = {get: "/api/v1/iam/cms/pages/slug/{slug}"};
  }

  // UpdateCMSPage updates an existing CMS page.
  // Note: page_slug is immutable and cannot be changed.
  rpc UpdateCMSPage(UpdateCMSPageRequest) returns (UpdateCMSPageResponse) {
    option (google.api.http) = {
      put: "/api/v1/iam/cms/pages/{page_id}"
      body: "*"
    };
  }

  // DeleteCMSPage soft deletes a CMS page.
  rpc DeleteCMSPage(DeleteCMSPageRequest) returns (DeleteCMSPageResponse) {
    option (google.api.http) = {delete: "/api/v1/iam/cms/pages/{page_id}"};
  }

  // ListCMSPages lists CMS pages with search, filter, and pagination.
  rpc ListCMSPages(ListCMSPagesRequest) returns (ListCMSPagesResponse) {
    option (google.api.http) = {get: "/api/v1/iam/cms/pages"};
  }
}

// CMSSectionService manages landing page sections (hero, features, FAQ, etc.).
service CMSSectionService {
  // CreateCMSSection creates a new CMS section.
  rpc CreateCMSSection(CreateCMSSectionRequest) returns (CreateCMSSectionResponse) {
    option (google.api.http) = {
      post: "/api/v1/iam/cms/sections"
      body: "*"
    };
  }

  // GetCMSSection retrieves a CMS section by ID.
  rpc GetCMSSection(GetCMSSectionRequest) returns (GetCMSSectionResponse) {
    option (google.api.http) = {get: "/api/v1/iam/cms/sections/{section_id}"};
  }

  // UpdateCMSSection updates an existing CMS section.
  // Note: section_key is immutable and cannot be changed.
  rpc UpdateCMSSection(UpdateCMSSectionRequest) returns (UpdateCMSSectionResponse) {
    option (google.api.http) = {
      put: "/api/v1/iam/cms/sections/{section_id}"
      body: "*"
    };
  }

  // DeleteCMSSection soft deletes a CMS section.
  rpc DeleteCMSSection(DeleteCMSSectionRequest) returns (DeleteCMSSectionResponse) {
    option (google.api.http) = {delete: "/api/v1/iam/cms/sections/{section_id}"};
  }

  // ListCMSSections lists CMS sections with search, filter, and pagination.
  rpc ListCMSSections(ListCMSSectionsRequest) returns (ListCMSSectionsResponse) {
    option (google.api.http) = {get: "/api/v1/iam/cms/sections"};
  }

  // GetPublicLandingContent fetches all published landing page content in one call.
  // Returns all published sections + all site settings.
  // This is a public endpoint — no authentication required.
  rpc GetPublicLandingContent(GetPublicLandingContentRequest) returns (GetPublicLandingContentResponse) {
    option (google.api.http) = {get: "/api/v1/public/landing"};
  }

  // UploadCMSImage uploads an image to MinIO storage for use in CMS sections.
  // Returns the public URL of the uploaded image.
  rpc UploadCMSImage(UploadCMSImageRequest) returns (UploadCMSImageResponse) {
    option (google.api.http) = {
      post: "/api/v1/iam/cms/upload"
      body: "*"
    };
  }
}

// CMSSettingService manages key-value site settings (site name, footer text, etc.).
// Settings are pre-seeded and can only be read or updated — not created or deleted.
service CMSSettingService {
  // GetCMSSetting retrieves a CMS setting by key.
  rpc GetCMSSetting(GetCMSSettingRequest) returns (GetCMSSettingResponse) {
    option (google.api.http) = {get: "/api/v1/iam/cms/settings/{setting_key}"};
  }

  // UpdateCMSSetting updates a CMS setting value.
  rpc UpdateCMSSetting(UpdateCMSSettingRequest) returns (UpdateCMSSettingResponse) {
    option (google.api.http) = {
      put: "/api/v1/iam/cms/settings/{setting_key}"
      body: "*"
    };
  }

  // ListCMSSettings lists CMS settings, optionally filtered by group.
  rpc ListCMSSettings(ListCMSSettingsRequest) returns (ListCMSSettingsResponse) {
    option (google.api.http) = {get: "/api/v1/iam/cms/settings"};
  }

  // BulkUpdateCMSSettings updates multiple settings at once.
  rpc BulkUpdateCMSSettings(BulkUpdateCMSSettingsRequest) returns (BulkUpdateCMSSettingsResponse) {
    option (google.api.http) = {
      put: "/api/v1/iam/cms/settings"
      body: "*"
    };
  }
}
