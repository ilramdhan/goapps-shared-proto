syntax = "proto3";

package finance.v1;

// Note: go_package is managed by buf.gen.yaml managed mode
// option go_package = "github.com/mutugading/goapps-backend/gen/finance/v1;financev1";

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "finance/v1/product.proto";
import "google/api/annotations.proto";

// =============================================================================
// MESSAGES - Entity
// =============================================================================

// ProductRequest represents a new-product creation request ticket.
message ProductRequest {
  // Unique identifier (UUID).
  string request_id = 1;
  // Auto-generated ticket number (format: PR-YYYYMM-NNN).
  string ticket_no = 2;
  // UUID of the user who submitted the request.
  string requester_id = 3;
  // Username of the requester (denormalized).
  string requester_username = 4;
  // Department UUID of the requester.
  string requester_dept_id = 5;
  // Short title summarising the request.
  string title = 6;
  // Detailed description of the product requirement.
  string description = 7;
  // Target specifications encoded as a JSON string (stored as JSONB).
  string target_specs_json = 8;
  // Request lifecycle status: OPEN, IN_REVIEW, PRODUCT_PROPOSED, RESOLVED, REJECTED.
  string status = 9;
  // UUID of the product created to fulfil this request (populated on resolve).
  string resolved_product_id = 10;
  // Note describing how the request was resolved or rejected.
  string resolution_note = 11;
  // UUID of the user currently assigned to action this request.
  string assigned_to = 12;
  // Target completion date (ISO 8601, YYYY-MM-DD).
  string due_date = 13;
  // Audit information.
  common.v1.AuditInfo audit = 99;
}

// =============================================================================
// MESSAGES - Create
// =============================================================================

// CreateRequestRequest is the request for creating a new product request ticket.
message CreateRequestRequest {
  // Short title (3-200 chars).
  string title = 1 [(buf.validate.field).string = {
    min_len: 3
    max_len: 200
  }];
  // Detailed description (max 5000 chars).
  string description = 2 [(buf.validate.field).string.max_len = 5000];
  // Target specifications as a JSON string (max 10000 chars).
  string target_specs_json = 3 [(buf.validate.field).string.max_len = 10000];
  // Optional target completion date (YYYY-MM-DD, max 10 chars).
  string due_date = 4 [(buf.validate.field).string.max_len = 10];
}

// CreateRequestResponse is the response for creating a product request.
message CreateRequestResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Created product request data.
  ProductRequest data = 2;
}

// =============================================================================
// MESSAGES - Get
// =============================================================================

// GetRequestRequest is the request for getting a product request by ID.
message GetRequestRequest {
  // Product request UUID.
  string request_id = 1 [(buf.validate.field).string.uuid = true];
}

// GetRequestResponse is the response for getting a product request.
message GetRequestResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Product request data.
  ProductRequest data = 2;
}

// =============================================================================
// MESSAGES - List
// =============================================================================

// ListRequestsRequest is the request for listing product requests with filters.
message ListRequestsRequest {
  // Pagination parameters.
  common.v1.PaginationRequest pagination = 1;
  // Free-text search on ticket_no, title, description.
  string search = 2 [(buf.validate.field).string.max_len = 100];
  // Filter by status (empty = no filter).
  string status = 3 [(buf.validate.field).string.max_len = 50];
  // Filter by requester UUID (empty = no filter).
  string requester_id = 4 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE
    string: {uuid: true}
  }];
  // Filter by assigned user UUID (empty = no filter).
  string assigned_to = 5 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE
    string: {uuid: true}
  }];
  // Filter by requester department UUID (empty = no filter).
  string requester_dept_id = 6 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE
    string: {uuid: true}
  }];
}

// ListRequestsResponse is the response for listing product requests.
message ListRequestsResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // List of product requests.
  repeated ProductRequest data = 2;
  // Pagination metadata.
  common.v1.PaginationResponse pagination = 3;
}

// =============================================================================
// MESSAGES - Update
// =============================================================================

// UpdateRequestRequest is the request for updating a product request.
message UpdateRequestRequest {
  // Product request UUID to update.
  string request_id = 1 [(buf.validate.field).string.uuid = true];
  // Updated title (3-200 chars).
  string title = 2 [(buf.validate.field).string = {
    min_len: 3
    max_len: 200
  }];
  // Updated description (max 5000 chars).
  string description = 3 [(buf.validate.field).string.max_len = 5000];
  // Updated target specifications as a JSON string (max 10000 chars).
  string target_specs_json = 4 [(buf.validate.field).string.max_len = 10000];
  // Updated target completion date (YYYY-MM-DD, max 10 chars).
  string due_date = 5 [(buf.validate.field).string.max_len = 10];
}

// UpdateRequestResponse is the response for updating a product request.
message UpdateRequestResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Updated product request data.
  ProductRequest data = 2;
}

// =============================================================================
// MESSAGES - Delete
// =============================================================================

// DeleteRequestRequest is the request for deleting a product request.
message DeleteRequestRequest {
  // Product request UUID to delete.
  string request_id = 1 [(buf.validate.field).string.uuid = true];
}

// DeleteRequestResponse is the response for deleting a product request.
message DeleteRequestResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
}

// =============================================================================
// MESSAGES - Assign
// =============================================================================

// AssignRequestRequest assigns a product request to a user for actioning.
message AssignRequestRequest {
  // Product request UUID.
  string request_id = 1 [(buf.validate.field).string.uuid = true];
  // UUID of the user to assign the request to.
  string assignee_id = 2 [(buf.validate.field).string.uuid = true];
}

// AssignRequestResponse is the response for assigning a product request.
message AssignRequestResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Updated product request data.
  ProductRequest data = 2;
}

// =============================================================================
// MESSAGES - Resolve
// =============================================================================

// ResolveRequestRequest marks a product request as resolved with a linked product.
message ResolveRequestRequest {
  // Product request UUID to resolve.
  string request_id = 1 [(buf.validate.field).string.uuid = true];
  // UUID of the product created to fulfil the request.
  string product_id = 2 [(buf.validate.field).string.uuid = true];
  // Optional resolution note (max 1000 chars).
  string resolution_note = 3 [(buf.validate.field).string.max_len = 1000];
}

// ResolveRequestResponse is the response for resolving a product request.
message ResolveRequestResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Updated product request data.
  ProductRequest data = 2;
}

// =============================================================================
// MESSAGES - Reject
// =============================================================================

// RejectRequestRequest rejects a product request with a mandatory reason.
message RejectRequestRequest {
  // Product request UUID to reject.
  string request_id = 1 [(buf.validate.field).string.uuid = true];
  // Rejection reason (5-1000 chars).
  string reason = 2 [(buf.validate.field).string = {
    min_len: 5
    max_len: 1000
  }];
}

// RejectRequestResponse is the response for rejecting a product request.
message RejectRequestResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Updated product request data.
  ProductRequest data = 2;
}

// =============================================================================
// MESSAGES - Search Existing Products
// =============================================================================

// SearchExistingProductsRequest searches existing products to find candidates
// that fulfil a product request (avoids duplicating existing products).
message SearchExistingProductsRequest {
  // Search query string (1-200 chars).
  string query = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  // Optional shade code to narrow results (max 30 chars).
  string shade_code = 2 [(buf.validate.field).string.max_len = 30];
  // Maximum number of results to return (1-50).
  int32 limit = 3 [(buf.validate.field).int32 = {
    gte: 1
    lte: 50
  }];
}

// SearchExistingProductsResponse is the response for the product search.
message SearchExistingProductsResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Matching products.
  repeated finance.v1.Product data = 2;
}

// =============================================================================
// SERVICE DEFINITION
// =============================================================================

// ProductRequestService manages product-creation request tickets from
// business units to the costing team.
service ProductRequestService {
  // CreateRequest opens a new product request ticket.
  rpc CreateRequest(CreateRequestRequest) returns (CreateRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/product-requests"
      body: "*"
    };
  }

  // GetRequest retrieves a product request by ID.
  rpc GetRequest(GetRequestRequest) returns (GetRequestResponse) {
    option (google.api.http) = {get: "/api/v1/finance/product-requests/{request_id}"};
  }

  // ListRequests lists product requests with filters and pagination.
  rpc ListRequests(ListRequestsRequest) returns (ListRequestsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/product-requests"};
  }

  // UpdateRequest updates a product request's editable fields.
  rpc UpdateRequest(UpdateRequestRequest) returns (UpdateRequestResponse) {
    option (google.api.http) = {
      put: "/api/v1/finance/product-requests/{request_id}"
      body: "*"
    };
  }

  // DeleteRequest soft-deletes a product request.
  rpc DeleteRequest(DeleteRequestRequest) returns (DeleteRequestResponse) {
    option (google.api.http) = {delete: "/api/v1/finance/product-requests/{request_id}"};
  }

  // AssignRequest assigns a product request to a user for actioning.
  rpc AssignRequest(AssignRequestRequest) returns (AssignRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/product-requests/{request_id}/assign"
      body: "*"
    };
  }

  // ResolveRequest marks a product request as resolved with a linked product.
  rpc ResolveRequest(ResolveRequestRequest) returns (ResolveRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/product-requests/{request_id}/resolve"
      body: "*"
    };
  }

  // RejectRequest rejects a product request with a mandatory reason.
  rpc RejectRequest(RejectRequestRequest) returns (RejectRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/product-requests/{request_id}/reject"
      body: "*"
    };
  }

  // SearchExistingProducts searches for existing products that may fulfil
  // a product request, helping to avoid creating duplicates.
  rpc SearchExistingProducts(SearchExistingProductsRequest) returns (SearchExistingProductsResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/product-requests/search"
      body: "*"
    };
  }
}
