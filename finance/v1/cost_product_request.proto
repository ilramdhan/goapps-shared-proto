syntax = "proto3";

package finance.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "finance/v1/uom.proto";
import "google/api/annotations.proto";

// =============================================================================
// CostProductRequest — PRD Phase A §7.1.1 (CPR_) + §7.1.2 (CPS_).
// State machine HARD-CODED per G3 (no IAM workflow template). The aggregate
// root is the request; the spec is an embedded 1:1 conditional value object.
// =============================================================================

// =============================================================================
// ENUMS
// =============================================================================

// TubeType represents the fixed Paper/Plastic tube classification for a
// product spec, replacing the old master-data-backed paper_tube_type_id lookup.
enum TubeType {
  // Default unspecified value - used when no tube type has been selected.
  TUBE_TYPE_UNSPECIFIED = 0;
  // Paper tube.
  TUBE_TYPE_PAPER = 1;
  // Plastic tube.
  TUBE_TYPE_PLASTIC = 2;
}

message CostProductSpec {
  int64 spec_id = 1;
  int64 request_id = 2;
  // POY_BOUGHTOUT | CHIPS_SD | CHIPS_BRT | CHIPS_RECYCLE.
  // Deprecated for new writes: retained for historical rows, no longer populated by new writes.
  string raw_material_type = 3;
  string product_description = 4;
  int32 shade_id = 5;
  // Free-text or master shade code (e.g. NL, Z114S). Renamed from shade_custom_text — field number unchanged for wire compatibility.
  string shade_code = 6;
  // Deprecated: retained for historical rows, no longer populated by new writes. Use tube_type instead.
  int32 paper_tube_type_id = 7;
  string paper_tube_label = 8; // denormalized
  // Deprecated for new writes: retained for historical rows, no longer populated by new writes.
  string weight_per_bobbin_kg = 9; // decimal stringified to preserve precision
  // JUMBO | NORMAL | PALLET.
  // Deprecated for new writes: retained for historical rows, no longer populated by new writes.
  string box_type = 10;
  string created_at = 11;
  string created_by = 12;
  // Human-readable shade name (e.g. Natural, Jet Black), mirrors cost_product_master's shade_name.
  string shade_name = 13;
  // Fixed Paper/Plastic tube classification. Replaces paper_tube_type_id for new writes.
  TubeType tube_type = 14;
}

message CostProductRequest {
  int64 request_id = 1;
  string request_no = 2; // REQ-YYYYMM-NNNN
  int32 request_type_id = 3;
  string request_type_code = 4; // denormalized
  string title = 5;
  string description = 6;
  string customer_name = 7;
  string customer_code = 8;
  string product_classification = 9; // existing | new
  string verified_classification = 10;
  string classification_override_reason = 11;
  string target_volume = 12; // decimal stringified
  string target_price_range = 13;
  string urgency_level = 14; // low | medium | high
  string needed_by_date = 15; // YYYY-MM-DD
  string status = 16;
  string closed_substatus = 17;
  string feasibility_decision = 18; // FEASIBLE | NOT_FEASIBLE
  string feasibility_note = 19;
  string feasibility_by = 20;
  string feasibility_at = 21;
  string reject_reason = 22;
  string cancel_reason = 23;
  string assigned_to_user_id = 24;
  string requester_user_id = 25;
  common.v1.AuditInfo audit = 26;
  CostProductSpec spec = 27;
  // When UseExistingCosting was invoked, points to the product master whose costing is reused. 0 = none.
  int64 existing_product_sys_id = 28;
  // Active route head linked to this request (many requests → one route head when spec matches).
  int64 linked_route_head_id = 29;
  // IAM workflow instance ID linked to this request (empty if no workflow attached).
  string wfl_instance_id = 30;
  // Optional reviewer-facing hint pointing at a similar existing product master,
  // used to pre-fill routing resolution during review. 0 = unset.
  int64 reference_product_sys_id = 31;
}

// =============================================================================
// CRUD
// =============================================================================

message SpecInput {
  // Deprecated for new writes: retained for historical rows, no longer populated by new writes.
  // Validation is skipped when empty so new writes (which always send "") pass.
  string raw_material_type = 1 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE
    string: {
      in: [
        "POY_BOUGHTOUT",
        "CHIPS_SD",
        "CHIPS_BRT",
        "CHIPS_RECYCLE"
      ]
    }
  }];
  string product_description = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 5000
  }];
  int32 shade_id = 3;
  // Free-text or master shade code (e.g. NL, Z114S). Renamed from shade_custom_text — field number unchanged for wire compatibility.
  string shade_code = 4 [(buf.validate.field).string.max_len = 100];
  // Deprecated: retained for historical rows, no longer populated by new writes. Use tube_type instead.
  // Validation is skipped when zero so new writes (which always send 0) pass.
  int32 paper_tube_type_id = 5 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE
    int32: {gte: 1}
  }];
  // Deprecated for new writes: retained for historical rows, no longer populated by new writes.
  // Validation is skipped when empty so new writes (which always send "") pass.
  string weight_per_bobbin_kg = 6 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE
    string: {
      min_len: 1
      max_len: 20
    }
  }];
  // Deprecated for new writes: retained for historical rows, no longer populated by new writes.
  // Validation is skipped when empty so new writes (which always send "") pass.
  string box_type = 7 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE
    string: {
      in: [
        "JUMBO",
        "NORMAL",
        "PALLET"
      ]
    }
  }];
  // Human-readable shade name (e.g. Natural, Jet Black), mirrors cost_product_master's shade_name.
  string shade_name = 8 [(buf.validate.field).string.max_len = 100];
  // Fixed Paper/Plastic tube classification. Replaces paper_tube_type_id for new writes.
  TubeType tube_type = 9;
}

message CreateCostProductRequestRequest {
  int32 request_type_id = 1 [(buf.validate.field).int32.gte = 1];
  string title = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  string description = 3 [(buf.validate.field).string.max_len = 10000];
  string customer_name = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  string customer_code = 5 [(buf.validate.field).string.max_len = 50];
  string product_classification = 6 [(buf.validate.field).string = {
    in: [
      "existing",
      "new",
      "pending"
    ]
  }];
  string target_volume = 7 [(buf.validate.field).string.max_len = 30];
  string target_price_range = 8 [(buf.validate.field).string.max_len = 50];
  string urgency_level = 9 [(buf.validate.field).string = {
    in: [
      "",
      "low",
      "medium",
      "high"
    ]
  }];
  string needed_by_date = 10 [(buf.validate.field).string.max_len = 10];
  SpecInput spec = 11;
  // Optional reviewer-facing hint pointing at a similar existing product master.
  // 0 = unset.
  int64 reference_product_sys_id = 12 [(buf.validate.field).int64.gte = 0];
}

message CreateCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

message GetCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
}

message GetCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

message GetCostProductRequestByNoRequest {
  string request_no = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 30
  }];
}

message GetCostProductRequestByNoResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

message UpdateCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
  string title = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  string description = 3 [(buf.validate.field).string.max_len = 10000];
  string customer_name = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  string customer_code = 5 [(buf.validate.field).string.max_len = 50];
  string product_classification = 6 [(buf.validate.field).string = {
    in: [
      "existing",
      "new",
      "pending"
    ]
  }];
  string target_volume = 7 [(buf.validate.field).string.max_len = 30];
  string target_price_range = 8 [(buf.validate.field).string.max_len = 50];
  string urgency_level = 9 [(buf.validate.field).string = {
    in: [
      "",
      "low",
      "medium",
      "high"
    ]
  }];
  string needed_by_date = 10 [(buf.validate.field).string.max_len = 10];
  SpecInput spec = 11;
  // Optional reviewer-facing hint pointing at a similar existing product master.
  // 0 = unset.
  int64 reference_product_sys_id = 12 [(buf.validate.field).int64.gte = 0];
}

message UpdateCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

message ListCostProductRequestsRequest {
  string search = 1 [(buf.validate.field).string.max_len = 200];
  string status = 2 [(buf.validate.field).string.max_len = 30];
  int32 request_type_id = 3;
  string requester_user_id = 4 [(buf.validate.field).string.max_len = 64];
  string assignee_user_id = 5 [(buf.validate.field).string.max_len = 64];
  common.v1.PaginationRequest pagination = 6;
  string sort_by = 7 [(buf.validate.field).string = {
    in: [
      "",
      "request_no",
      "created_at",
      "updated_at",
      "status",
      "type",
      "title",
      "customer",
      "class",
      "urgency"
    ]
  }];
  string sort_order = 8 [(buf.validate.field).string = {
    in: [
      "",
      "asc",
      "desc"
    ]
  }];
}

message ListCostProductRequestsResponse {
  common.v1.BaseResponse base = 1;
  repeated CostProductRequest data = 2;
  common.v1.PaginationResponse pagination = 3;
}

// =============================================================================
// Excel Export/Import/Template (design.md §4 Area D6). Create-only import:
// every row creates a new DRAFT request, no dedup/merge against existing rows.
// =============================================================================

// ExportCostProductRequestsRequest is the request for exporting cost product
// requests to Excel. Filters mirror ListCostProductRequestsRequest's subset
// relevant to export (no pagination/sort — export returns all matches).
message ExportCostProductRequestsRequest {
  string search = 1 [(buf.validate.field).string.max_len = 200];
  string status = 2 [(buf.validate.field).string.max_len = 30];
  int32 request_type_id = 3;
}

// ExportCostProductRequestsResponse is the response containing the Excel file.
message ExportCostProductRequestsResponse {
  common.v1.BaseResponse base = 1;
  // Excel file content as bytes (.xlsx format).
  bytes file_content = 2;
  // Suggested filename.
  string file_name = 3;
}

// ImportCostProductRequestsRequest is the request for importing cost product
// requests from Excel. Create-only: every row creates a new DRAFT request
// regardless of duplicate_action — the field is accepted for shape parity
// with other import RPCs but has no skip/update effect in v1.
message ImportCostProductRequestsRequest {
  // Excel file content as bytes (.xlsx or .xls format).
  bytes file_content = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 10485760 // 10MB max
  }];
  // Original filename (for format detection).
  // Must be a simple filename without path separators.
  string file_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
    pattern: "^[^/\\\\]+\\.(xlsx|xls)$"
  }];
  // Accepted for shape parity with other import RPCs. Create-only: only
  // "error" semantics apply (unresolvable rows fail with a row-level
  // ImportError); there is no update/skip behavior in v1.
  string duplicate_action = 3 [(buf.validate.field).string = {
    in: [
      "skip",
      "update",
      "error"
    ]
    min_len: 1
  }];
}

// ImportCostProductRequestsResponse is the response for importing cost
// product requests. updated_count/skipped_count are always 0 in v1 since
// the import is create-only (kept for shape consistency with other imports).
message ImportCostProductRequestsResponse {
  common.v1.BaseResponse base = 1;
  // Number of successfully created DRAFT requests.
  int32 success_count = 2;
  // Always 0 in v1 (create-only import has no skip semantics).
  int32 skipped_count = 3;
  // Always 0 in v1 (create-only import has no update semantics).
  int32 updated_count = 4;
  // Number of failed rows.
  int32 failed_count = 5;
  // Details of failed rows.
  repeated ImportError errors = 6;
}

// GetCostProductRequestImportTemplateRequest is the request for downloading
// the Excel import template.
message GetCostProductRequestImportTemplateRequest {}

// GetCostProductRequestImportTemplateResponse is the response containing the
// template file.
message GetCostProductRequestImportTemplateResponse {
  common.v1.BaseResponse base = 1;
  // Excel template file content as bytes (.xlsx format).
  bytes file_content = 2;
  // Suggested filename.
  string file_name = 3;
}

// =============================================================================
// State transitions (hard-coded per G3). Each RPC has a dedicated req+resp pair.
// =============================================================================

message SubmitCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
}
message SubmitCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

message StartCostProductRequestReviewRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
}
message StartCostProductRequestReviewResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

message VerifyCostProductRequestClassificationRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
  string verified_classification = 2 [(buf.validate.field).string = {
    in: [
      "existing",
      "new"
    ]
  }];
  string override_reason = 3 [(buf.validate.field).string.max_len = 2000];
}
message VerifyCostProductRequestClassificationResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

message DecideCostProductRequestFeasibilityRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
  string decision = 2 [(buf.validate.field).string = {
    in: [
      "FEASIBLE",
      "NOT_FEASIBLE"
    ]
  }];
  string note = 3 [(buf.validate.field).string.max_len = 5000];
}
message DecideCostProductRequestFeasibilityResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

// SubmitAndDecideCostProductRequest merges Submit + Start-review + Verify
// classification + Decide feasibility + (when feasible) Link route into a
// single action (design.md §3 B3). SUBMITTED and UNDER_REVIEW remain real
// internal states recorded in the audit trail; only one consolidated
// notification pair is emitted regardless of the feasibility outcome.
message SubmitAndDecideCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
  string verified_classification = 2 [(buf.validate.field).string = {
    in: [
      "existing",
      "new"
    ]
  }];
  string override_reason = 3 [(buf.validate.field).string.max_len = 2000];
  string decision = 4 [(buf.validate.field).string = {
    in: [
      "FEASIBLE",
      "NOT_FEASIBLE"
    ]
  }];
  string note = 5 [(buf.validate.field).string.max_len = 5000];
  // reference_product_head_id is the route head resolved by RoutingResolver
  // on the client before submitting; only applied when decision is FEASIBLE.
  // 0 means no route was resolved (e.g. decision is NOT_FEASIBLE).
  int64 reference_product_head_id = 6 [(buf.validate.field).int64.gte = 0];
}
message SubmitAndDecideCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

message UseExistingCostingForCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
  // Existing product the request reuses costing from — recorded on the
  // request so QUOTE_READY traces back to a concrete product master.
  int64 existing_product_sys_id = 2 [(buf.validate.field).int64.gte = 1];
}
message UseExistingCostingForCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

message RejectCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
  string reason = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 5000
  }];
}
message RejectCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

message ReviseCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
}
message ReviseCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

// Reopen moves a terminal CLOSED request back to DRAFT so it can re-enter the
// lifecycle. Restricted to admins at the delivery layer.
message ReopenCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
}
message ReopenCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

// MarkParameterPending moves ROUTING_DEFINED → PARAMETER_PENDING.
// Creates fill tasks for every route level attached to this request.
message MarkParameterPendingRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
}
message MarkParameterPendingResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

// MarkParameterComplete moves PARAMETER_PENDING → PARAMETER_COMPLETE.
// The handler verifies all promoted products have their required CAPP params
// filled before allowing the transition.
message MarkParameterCompleteRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
}
message MarkParameterCompleteResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
  // missing_products lists product_sys_ids that still have required params unfilled
  // when the transition is blocked. Empty when the response is_success = true.
  repeated MissingProductParams missing_products = 3;
}

message MissingProductParams {
  int64 product_sys_id = 1;
  string product_code = 2;
  string product_name = 3;
  repeated string missing_param_codes = 4;
}

message CancelCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
  string reason = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 5000
  }];
}
message CancelCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

message CloseCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
  string closed_substatus = 2 [(buf.validate.field).string = {
    in: [
      "won",
      "lost",
      "cancelled",
      "on_hold"
    ]
  }];
}
message CloseCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

message AssignCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
  string assignee_user_id = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
}
message AssignCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

// ConfirmCostProductRequest advances PARAMETER_COMPLETE → CONFIRMED.
// Requires finance.product.request.confirm permission.
message ConfirmCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
}
message ConfirmCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

// ApproveCostProductRequest advances CONFIRMED → APPROVED.
// Requires finance.product.request.approve permission.
message ApproveCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
  string note = 2 [(buf.validate.field).string.max_len = 1000];
}
message ApproveCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

// ReleaseCostProductRequest advances APPROVED → RELEASED.
// Requires finance.product.request.release permission.
// After release the request is locked and ready for the cost calculation engine.
message ReleaseCostProductRequestRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
}
message ReleaseCostProductRequestResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

// ==========================================================================
// GetCostProductRequestHistory — approval trace
// ==========================================================================

// StatusHistoryEntry records a single CPR status transition.
message StatusHistoryEntry {
  int64 id = 1;
  int64 request_id = 2;
  string from_status = 3;
  string to_status = 4;
  string actor_user_id = 5;
  string actor_name = 6;
  string note = 7;
  string created_at = 8;
}

// GetCostProductRequestHistoryRequest carries the CPR id to query.
message GetCostProductRequestHistoryRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gt = 0];
}

// GetCostProductRequestHistoryResponse returns the full status-transition timeline.
message GetCostProductRequestHistoryResponse {
  common.v1.BaseResponse base = 1;
  repeated StatusHistoryEntry entries = 2;
}

service CostProductRequestService {
  rpc CreateCostProductRequest(CreateCostProductRequestRequest) returns (CreateCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests"
      body: "*"
    };
  }
  rpc GetCostProductRequest(GetCostProductRequestRequest) returns (GetCostProductRequestResponse) {
    option (google.api.http) = {get: "/api/v1/finance/cost-product-requests/{request_id}"};
  }
  rpc GetCostProductRequestByNo(GetCostProductRequestByNoRequest) returns (GetCostProductRequestByNoResponse) {
    option (google.api.http) = {get: "/api/v1/finance/cost-product-requests/by-no/{request_no}"};
  }
  rpc UpdateCostProductRequest(UpdateCostProductRequestRequest) returns (UpdateCostProductRequestResponse) {
    option (google.api.http) = {
      put: "/api/v1/finance/cost-product-requests/{request_id}"
      body: "*"
    };
  }
  rpc ListCostProductRequests(ListCostProductRequestsRequest) returns (ListCostProductRequestsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/cost-product-requests"};
  }
  rpc SubmitCostProductRequest(SubmitCostProductRequestRequest) returns (SubmitCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/submit"
      body: "*"
    };
  }
  rpc StartCostProductRequestReview(StartCostProductRequestReviewRequest) returns (StartCostProductRequestReviewResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/start-review"
      body: "*"
    };
  }
  rpc VerifyCostProductRequestClassification(VerifyCostProductRequestClassificationRequest) returns (VerifyCostProductRequestClassificationResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/verify-classification"
      body: "*"
    };
  }
  rpc DecideCostProductRequestFeasibility(DecideCostProductRequestFeasibilityRequest) returns (DecideCostProductRequestFeasibilityResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/decide-feasibility"
      body: "*"
    };
  }
  // SubmitAndDecideCostProductRequest merges Submit + Start-review + Verify
  // classification + Decide feasibility + (when feasible) Link route into a
  // single action (design.md §3 B3).
  rpc SubmitAndDecideCostProductRequest(SubmitAndDecideCostProductRequestRequest) returns (SubmitAndDecideCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/submit-and-decide"
      body: "*"
    };
  }
  rpc UseExistingCostingForCostProductRequest(UseExistingCostingForCostProductRequestRequest) returns (UseExistingCostingForCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/use-existing-costing"
      body: "*"
    };
  }
  rpc RejectCostProductRequest(RejectCostProductRequestRequest) returns (RejectCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/reject"
      body: "*"
    };
  }
  rpc ReviseCostProductRequest(ReviseCostProductRequestRequest) returns (ReviseCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/revise"
      body: "*"
    };
  }
  // ReopenCostProductRequest moves a CLOSED request back to DRAFT.
  rpc ReopenCostProductRequest(ReopenCostProductRequestRequest) returns (ReopenCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/reopen"
      body: "*"
    };
  }
  // MarkParameterPending advances ROUTING_DEFINED → PARAMETER_PENDING and
  // creates fill tasks for every route level before committing the transition.
  rpc MarkParameterPending(MarkParameterPendingRequest) returns (MarkParameterPendingResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/mark-parameter-pending"
      body: "*"
    };
  }
  // MarkParameterComplete advances PARAMETER_PENDING → PARAMETER_COMPLETE
  // after verifying all promoted products have required params filled.
  rpc MarkParameterComplete(MarkParameterCompleteRequest) returns (MarkParameterCompleteResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/mark-parameter-complete"
      body: "*"
    };
  }
  rpc CancelCostProductRequest(CancelCostProductRequestRequest) returns (CancelCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/cancel"
      body: "*"
    };
  }
  rpc CloseCostProductRequest(CloseCostProductRequestRequest) returns (CloseCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/close"
      body: "*"
    };
  }
  rpc AssignCostProductRequest(AssignCostProductRequestRequest) returns (AssignCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/assign"
      body: "*"
    };
  }
  // LinkExistingRoute attaches an existing route_head to the request.
  rpc LinkExistingRoute(LinkExistingRouteRequest) returns (LinkExistingRouteResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/link-route"
      body: "*"
    };
  }
  // UnlinkRoute clears both existing-product and linked-route fields.
  rpc UnlinkRoute(UnlinkRouteRequest) returns (UnlinkRouteResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/unlink-route"
      body: "*"
    };
  }
  // ConfirmCostProductRequest advances PARAMETER_COMPLETE → CONFIRMED.
  rpc ConfirmCostProductRequest(ConfirmCostProductRequestRequest) returns (ConfirmCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/confirm"
      body: "*"
    };
  }
  // ApproveCostProductRequest advances CONFIRMED → APPROVED.
  rpc ApproveCostProductRequest(ApproveCostProductRequestRequest) returns (ApproveCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/approve"
      body: "*"
    };
  }
  // ReleaseCostProductRequest advances APPROVED → RELEASED.
  // After release the request is locked and the cost calculation engine can proceed.
  rpc ReleaseCostProductRequest(ReleaseCostProductRequestRequest) returns (ReleaseCostProductRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/{request_id}/release"
      body: "*"
    };
  }
  // GetCostProductRequestHistory returns the full status-transition timeline for a request.
  rpc GetCostProductRequestHistory(GetCostProductRequestHistoryRequest) returns (GetCostProductRequestHistoryResponse) {
    option (google.api.http) = {get: "/api/v1/finance/cost-product-requests/{request_id}/history"};
  }
  // GetParamSummary returns all param values for the request grouped by product
  // and fill level. Used by ParamSummaryPanel and ConfirmActionDialog.
  rpc GetParamSummary(GetParamSummaryRequest) returns (GetParamSummaryResponse) {
    option (google.api.http) = {get: "/api/v1/finance/cost-product-requests/{request_id}/param-summary"};
  }
  // ExportCostProductRequests exports cost product requests to Excel file.
  rpc ExportCostProductRequests(ExportCostProductRequestsRequest) returns (ExportCostProductRequestsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/cost-product-requests/export"};
  }
  // ImportCostProductRequests imports cost product requests from Excel file.
  // Create-only: every row creates a new DRAFT request, no dedup/merge.
  rpc ImportCostProductRequests(ImportCostProductRequestsRequest) returns (ImportCostProductRequestsResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-requests/import"
      body: "*"
    };
  }
  // GetCostProductRequestImportTemplate downloads the Excel import template.
  rpc GetCostProductRequestImportTemplate(GetCostProductRequestImportTemplateRequest) returns (GetCostProductRequestImportTemplateResponse) {
    option (google.api.http) = {get: "/api/v1/finance/cost-product-requests/template"};
  }
}

message LinkExistingRouteRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gt = 0];
  int64 route_head_id = 2 [(buf.validate.field).int64.gt = 0];
}
message LinkExistingRouteResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}
message UnlinkRouteRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gt = 0];
}
message UnlinkRouteResponse {
  common.v1.BaseResponse base = 1;
  CostProductRequest data = 2;
}

// ParamValueEntry is one parameter cell in the summary.
message ParamValueEntry {
  string param_id = 1;
  string param_code = 2;
  string param_name = 3;
  string data_type = 4;
  bool has_value = 5;
  string value_numeric = 6;
  string value_text = 7;
  bool value_flag = 8;
  string uom_code = 9;
  bool is_required = 10;
  string display_group = 11;
  int32 display_order = 12;
}

// FillLevelSummary groups params for one fill task level of a product.
message FillLevelSummary {
  int32 route_level = 1;
  string task_status = 2;
  string filled_by_user_id = 3;
  string filled_at = 4;
  int32 filled_params = 5;
  int32 total_params = 6;
  repeated ParamValueEntry params = 7;
  // last_edited_by is the user who last overrode a param value at this level (empty if no override).
  string last_edited_by = 8;
  // last_edited_at is when the most recent override occurred at this level.
  string last_edited_at = 9;
}

// ProductParamSummary groups fill levels for one product in the route.
message ProductParamSummary {
  int64 product_sys_id = 1;
  string product_code = 2;
  string product_name = 3;
  repeated FillLevelSummary levels = 4;
}

message GetParamSummaryRequest {
  int64 request_id = 1 [(buf.validate.field).int64.gte = 1];
}

message GetParamSummaryResponse {
  common.v1.BaseResponse base = 1;
  repeated ProductParamSummary products = 2;
  int32 total_params = 3;
  int32 filled_params = 4;
}
