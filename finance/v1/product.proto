syntax = "proto3";

package finance.v1;

// Note: go_package is managed by buf.gen.yaml managed mode
// option go_package = "github.com/mutugading/goapps-backend/gen/finance/v1;financev1";

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "google/api/annotations.proto";

// =============================================================================
// MESSAGES - Entity
// =============================================================================

// CopyOptions controls which sections are copied during a product duplication.
message CopyOptions {
  // Copy parameter values from the source product.
  bool include_values = 1;
  // Copy routing data from the source product.
  bool include_routing = 2;
  // Copy raw material (RM) data from the source product.
  bool include_rm = 3;
  // Copy attachments from the source product.
  bool include_attachments = 4;
}

// Product represents a product costing entity.
message Product {
  // Unique identifier (UUID).
  string product_id = 1;
  // Unique product code (immutable after creation).
  string product_code = 2;
  // Display name.
  string product_name = 3;
  // Oracle item code linked to this product.
  string product_item_code = 4;
  // Shade code (optional).
  string product_shade_code = 5;
  // Shade name (optional).
  string product_shade_name = 6;
  // Product lifecycle status: DRAFT, PARAM_PENDING, ACTIVE, INACTIVE.
  string product_status = 7;
  // Workflow status: DRAFT, SUBMITTED, CONFIRMED, LOCKED, UNLOCK_REQUESTED.
  // Phase 1 only emits DRAFT.
  string workflow_status = 8;
  // Department that created this product (UUID).
  string created_by_dept_id = 9;
  // Department code (denormalized).
  string created_by_dept_code = 10;
  // Product purpose: COMMERCIAL, TESTING, TRIAL.
  string purpose = 11;
  // UUID of the product this was duplicated from (empty when not a duplicate).
  string duplicated_from_id = 12;
  // Note describing the reason or scope of the duplication.
  string duplication_note = 13;
  // Which sections were copied during duplication.
  CopyOptions copied_with_options = 14;
  // The product-request ticket currently associated with this product (optional).
  string current_request_id = 15;
  // Audit information.
  common.v1.AuditInfo audit = 99;
}

// =============================================================================
// MESSAGES - Create
// =============================================================================

// CreateProductRequest is the request for creating a new product.
message CreateProductRequest {
  // Unique product code (1-30 chars). Immutable after creation.
  string product_code = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 30
  }];
  // Display name (1-200 chars).
  string product_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  // Oracle item code (1-30 chars).
  string product_item_code = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 30
  }];
  // Shade code (optional, max 30 chars).
  string product_shade_code = 4 [(buf.validate.field).string.max_len = 30];
  // Shade name (optional, max 100 chars).
  string product_shade_name = 5 [(buf.validate.field).string.max_len = 100];
  // Department UUID that owns this product.
  string created_by_dept_id = 6 [(buf.validate.field).string.uuid = true];
  // Product purpose: COMMERCIAL, TESTING, or TRIAL.
  string purpose = 7 [(buf.validate.field).string.pattern = "^(COMMERCIAL|TESTING|TRIAL)$"];
  // Optional associated product-request UUID.
  // When provided, must be a valid UUID (validated server-side when non-empty).
  string current_request_id = 8 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE
    string: {uuid: true}
  }];
}

// CreateProductResponse is the response for creating a product.
message CreateProductResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Created product data.
  Product data = 2;
}

// =============================================================================
// MESSAGES - Get
// =============================================================================

// GetProductRequest is the request for getting a product by ID.
message GetProductRequest {
  // Product ID (UUID format).
  string product_id = 1 [(buf.validate.field).string.uuid = true];
}

// GetProductResponse is the response for getting a product.
message GetProductResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Product data.
  Product data = 2;
}

// =============================================================================
// MESSAGES - List
// =============================================================================

// ListProductsRequest is the request for listing products with filters and pagination.
message ListProductsRequest {
  // Pagination parameters.
  common.v1.PaginationRequest pagination = 1;
  // Free-text search on code, name, item code, shade code/name.
  string search = 2 [(buf.validate.field).string.max_len = 100];
  // Filter by workflow status (empty = no filter).
  string workflow_status = 3 [(buf.validate.field).string.max_len = 50];
  // Filter by product status (empty = no filter).
  string product_status = 4 [(buf.validate.field).string.max_len = 50];
  // Filter by purpose (empty = no filter).
  string purpose = 5 [(buf.validate.field).string.max_len = 50];
  // Filter by creating department UUID (empty = no filter).
  string created_by_dept_id = 6 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE
    string: {uuid: true}
  }];
}

// ListProductsResponse is the response for listing products.
message ListProductsResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // List of products.
  repeated Product data = 2;
  // Pagination metadata.
  common.v1.PaginationResponse pagination = 3;
}

// =============================================================================
// MESSAGES - Update
// =============================================================================

// UpdateProductRequest is the request for updating a product.
// Note: product_code and product_item_code are immutable.
message UpdateProductRequest {
  // Product ID to update (UUID format).
  string product_id = 1 [(buf.validate.field).string.uuid = true];
  // New display name (1-200 chars).
  string product_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  // New shade code (optional, max 30 chars).
  optional string product_shade_code = 3 [(buf.validate.field).string.max_len = 30];
  // New shade name (optional, max 100 chars).
  optional string product_shade_name = 4 [(buf.validate.field).string.max_len = 100];
  // New purpose: COMMERCIAL, TESTING, or TRIAL.
  string purpose = 5 [(buf.validate.field).string.pattern = "^(COMMERCIAL|TESTING|TRIAL)$"];
}

// UpdateProductResponse is the response for updating a product.
message UpdateProductResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Updated product data.
  Product data = 2;
}

// =============================================================================
// MESSAGES - Delete
// =============================================================================

// DeleteProductRequest is the request for soft-deleting a product.
message DeleteProductRequest {
  // Product ID to delete (UUID format).
  string product_id = 1 [(buf.validate.field).string.uuid = true];
}

// DeleteProductResponse is the response for deleting a product.
message DeleteProductResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
}

// =============================================================================
// MESSAGES - Duplicate
// =============================================================================

// DuplicateProductRequest creates a new product by copying an existing one.
message DuplicateProductRequest {
  // Source product to duplicate (UUID format).
  string source_product_id = 1 [(buf.validate.field).string.uuid = true];
  // Code for the new product (1-30 chars).
  string product_code = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 30
  }];
  // Name for the new product (1-200 chars).
  string product_name = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  // Optional note explaining the reason/scope of the duplication (max 200 chars).
  string duplication_note = 4 [(buf.validate.field).string.max_len = 200];
  // Which sections to copy from the source product.
  CopyOptions options = 5;
  // Optional associated product-request UUID.
  string current_request_id = 6 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE
    string: {uuid: true}
  }];
}

// DuplicateProductResponse is the response for duplicating a product.
message DuplicateProductResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Newly created product data.
  Product data = 2;
}

// =============================================================================
// MESSAGES - List by Request
// =============================================================================

// ListProductsByRequestRequest lists products linked to a specific product request.
message ListProductsByRequestRequest {
  // Product-request UUID to filter by.
  string request_id = 1 [(buf.validate.field).string.uuid = true];
  // Pagination parameters.
  common.v1.PaginationRequest pagination = 2;
}

// ListProductsByRequestResponse is the response for listing products by request.
message ListProductsByRequestResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // List of products.
  repeated Product data = 2;
  // Pagination metadata.
  common.v1.PaginationResponse pagination = 3;
}

// =============================================================================
// SERVICE DEFINITION
// =============================================================================

// ProductService provides CRUD and duplication operations for product costing.
service ProductService {
  // CreateProduct creates a new product.
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/products"
      body: "*"
    };
  }

  // GetProduct retrieves a product by ID.
  rpc GetProduct(GetProductRequest) returns (GetProductResponse) {
    option (google.api.http) = {get: "/api/v1/finance/products/{product_id}"};
  }

  // ListProducts lists products with filters and pagination.
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/products"};
  }

  // UpdateProduct updates a product's mutable fields.
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse) {
    option (google.api.http) = {
      put: "/api/v1/finance/products/{product_id}"
      body: "*"
    };
  }

  // DeleteProduct soft-deletes a product.
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse) {
    option (google.api.http) = {delete: "/api/v1/finance/products/{product_id}"};
  }

  // DuplicateProduct creates a new product by copying an existing one.
  rpc DuplicateProduct(DuplicateProductRequest) returns (DuplicateProductResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/products/{source_product_id}/duplicate"
      body: "*"
    };
  }

  // ListProductsByRequest lists products associated with a specific product request.
  rpc ListProductsByRequest(ListProductsByRequestRequest) returns (ListProductsByRequestResponse) {
    option (google.api.http) = {get: "/api/v1/finance/product-requests/{request_id}/products"};
  }
}
